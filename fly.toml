# Fly.io config — alternative to Render.
# Deploy: fly launch --copy-config --no-deploy && fly volumes create episodes -s 10
#         && fly secrets set APP_PASSWORD=... ANTHROPIC_API_KEY=... GLM_API_KEY=... GEMINI_API_KEY=...
#         && fly deploy
app = "deep-dives"
primary_region = "iad"

[http_service]
  internal_port = 8000
  force_https = true
  # Never scale to zero or above one machine: episode jobs run in-process
  # and state lives on the attached volume.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "episodes"
  destination = "/app/output"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
