urate at the ten thousandth?", "Check for multi-homing. If users can cheaply belong to two networks, the effect is much weaker than it looks.", "Ask what the minimum viable network is for a competitor, since that sets the entry barrier."], "matters": "Saturation and multi-homing are what kill network-effect theses, and both are observable. Most network effects saturate — once the network is dense enough for a user's purposes, additional members add nothing, and the barrier stops growing precisely when the narrative is strongest. Ask what a user actually needs from the network, and whether a competitor at 5% of the size could deliver that. Very often they could.", "trap": "Calling any two-sided marketplace a network effect without checking whether either side benefits from density. Ignoring multi-homing. Assuming the effect keeps compounding after it has saturated.", "followups": ["Does the millionth user add value, or did this saturate long ago?", "How cheaply can a user belong to two of these at once?", "What is the minimum viable network a competitor needs?"]}, {"id": "QUA-04", "object": "stock", "mode": "general", "type": "framework", "q": "The incumbent could crush this challenger tomorrow. Why haven't they?", "principle": "Counter-positioning is a power where the challenger adopts a business model the incumbent cannot copy without damaging its own existing business. The barrier is not capability — it is that responding is rationally unattractive to the incumbent. It is the only power that is strongest against the largest competitor, and the one most consistently mispriced, because the incumbent's inaction looks like complacency until it is too late.", "framing": ["Describe the challenger's model and how it differs economically, not just in features.", "Ask what the incumbent would have to give up to copy it — margin, channel relationships, existing revenue, or an internal cost structure.", "Quantify the collateral damage. Counter-positioning holds when the damage exceeds the opportunity.", "Check the incumbent's incentives: management compensation, analyst expectations, and reported margin all push against self-cannibalisation.", "Establish how long the incumbent can rationally wait, and what forces their hand.", "Ask what happens when the incumbent finally does respond, because eventually they do."], "matters": "The predictable sequence is denial, then partial response, then a full response that arrives too late — and the incumbent behaves rationally at every step. Watch for the moment the incumbent's existing business is impaired enough that cannibalisation stops costing them anything, because that is when the barrier disappears. The challenger's window is the period during which the incumbent's own P&L is the thing protecting the challenger.", "trap": "Mistaking incumbent slowness for counter-positioning — the test is whether responding is unattractive, not whether they are badly run. Missing that a new CEO or an already-impaired core business can remove the constraint overnight.", "followups": ["What exactly does the incumbent lose by responding?", "How long can they rationally wait?", "What event removes their reason for restraint?"]}, {"id": "QUA-05", "object": "stock", "mode": "general", "type": "framework", "q": "How high are the switching costs, and how would you measure them rather than assert them?", "principle": "Switching costs come in three forms — financial, procedural, and relational — and they are measurable in the customer's currency of time, risk, and disruption rather than in fees. They are a power when the cost of switching exceeds the benefit of a better alternative, which means they must be assessed against how much better the alternative actually is.", "framing": ["Separate the three types: financial cost to switch, procedural cost in time and retraining, and relational cost in trust and embedded workflow.", "Ask what breaks during a switch and who gets blamed. Career risk is the most powerful switching cost there is.", "Look at the integration surface: how many other systems touch this one, and how much data lives inside it.", "Verify in the numbers — gross retention is the direct measurement of switching costs, and it is much more informative than net retention.", "Test against a materially better alternative. Switching costs that hold against a 10% improvement may not hold against a 10x one.", "Check whether the costs are rising or falling as the ecosystem standardises."], "matters": "Gross retention is the honest metric and the one to insist on. Net retention conflates expansion within existing customers with the failure to lose them, and a high net retention number can hide meaningful gross churn beneath aggressive upselling. Gross retention tells you directly what proportion of customers found switching worth the cost, which is precisely the definition of the power you are trying to measure.", "trap": "Citing net retention as evidence of switching costs. Assuming contractual lock-in is switching cost — contracts expire, and renewal is where the real test happens. Ignoring that standardisation and migration tooling erode these costs over time.", "followups": ["What is gross retention, separate from net?", "Who inside the customer gets blamed if the migration goes badly?", "Do these costs hold against something that is ten times better, not ten percent?"]}, {"id": "QUA-06", "object": "stock", "mode": "general", "type": "framework", "q": "They have a famous brand. Is that a power, or just marketing spend?", "principle": "Branding is a power only when it lets the company charge more for a functionally identical product, and when that premium survives without proportionally rising marketing spend. It works by reducing perceived risk or conferring identity value, and it requires long, consistent investment — which is exactly what makes it a barrier, since a competitor cannot compress that history with money.", "framing": ["Test for a price premium on a functionally comparable product. No premium means no branding power.", "Ask what the brand does for the buyer — reduces risk, signals identity, or saves search effort.", "Check whether the premium is stable or requires ever-increasing marketing spend to sustain.", "Establish how long the brand took to build, since that duration is the barrier.", "Ask whether the category is one where brand matters. In categories with objective, verifiable performance metrics, brand power is weak.", "Consider fragility: brand power is asymmetric, built over decades and damaged in a quarter."], "matters": "The clean test is price premium relative to marketing intensity, tracked over time. If the premium is holding while marketing spend as a percentage of revenue is flat or falling, the brand is a genuine asset compounding on its own. If the premium requires steadily rising spend to maintain, you are not looking at a power — you are looking at a rented position, and the rent is disclosed in the income statement.", "trap": "Confusing awareness with pricing power — plenty of famous brands command no premium. Assuming brand transfers across categories. Ignoring how quickly brand power breaks in categories where performance is objectively measurable.", "followups": ["What is the price premium versus a functionally equivalent product?", "Is marketing spend as a share of revenue rising to hold that premium?", "Does brand matter in a category where buyers can measure performance directly?"]}, {"id": "QUA-07", "object": "stock", "mode": "general", "type": "framework", "q": "Is there a cornered resource here, and what stops it from walking out of the door?", "principle": "A cornered resource is preferential access to a valuable asset on attractive terms — a patent estate, a mineral deposit, an exclusive contract, an irreplaceable team. The barrier is exclusivity itself. The critical question is always who captures the value: if the resource can renegotiate, it will extract the surplus for itself rather than for shareholders.", "framing": ["Identify the resource precisely and confirm that access is genuinely exclusive rather than merely early.", "Establish the terms and, crucially, the duration. A resource secured on favourable terms for two years is a timing advantage.", "Ask who has the bargaining power at renewal.", "If the resource is people, ask what stops them from leaving or being hired away.", "Ask whether the resource is substitutable — a patent matters only if there is no alternative route to the same outcome.", "Check where the economics actually land: in the company's margin, or in the resource's compensation."], "matters": "Where the resource is human, the value usually accrues to the humans rather than to shareholders. Talent renegotiates continuously and captures its own surplus, which is why businesses built on irreplaceable individuals rarely sustain excess returns for owners. The cornered resources that create durable shareholder value are ones that cannot bargain — geology, spectrum, a patent, a long-dated exclusive contract with a counterparty who has no leverage.", "trap": "Counting a patent portfolio without checking whether an alternative route exists. Treating a key team as a durable resource. Missing the renewal date on the contract that constitutes the entire advantage.", "followups": ["When does this expire or come up for renewal, and who holds the leverage then?", "Does the surplus land in margin or in compensation?", "Is there another way to achieve the same outcome without this resource?"]}, {"id": "QUA-08", "object": "stock", "mode": "general", "type": "framework", "q": "They claim their operational execution is the moat. Is that process power, or just a good year?", "principle": "Process power is a superior way of operating, embedded in an organisation, that competitors cannot replicate quickly even when they can observe it. The barrier is that it takes years of iterative development to build and cannot be bought or copied wholesale. It is the rarest of the powers and the most frequently claimed, which makes the burden of proof high.", "framing": ["Identify the specific operational metric where the company is superior, and quantify the gap.", "Establish how long the gap has persisted. Process power shows up as a durable, widening advantage, not a good couple of years.", "Ask whether competitors know about it. If the advantage survives being fully understood, that is evidence of a real barrier.", "Ask why it cannot be copied — usually because it is embedded in tacit knowledge and thousands of small decisions rather than a single practice.", "Check whether it was built gradually over many years, since that duration is the barrier.", "Confirm it converts into economics: lower cost, better quality, faster cycle time, and ultimately margin."], "matters": "The bar is that the advantage persists even after competitors have studied it openly. Genuine process power is usually visible to everyone in the industry and still not replicable, because it lives in accumulated tacit organisational knowledge rather than in a documented practice. If a competitor could copy it by hiring three people or buying software, it is an operating advantage — real, valuable, worth something, but not durable and not worth a moat multiple.", "trap": "Attributing to process what is actually scale. Extrapolating two good years into a structural advantage. Accepting a claim of superior culture without a quantified operating metric behind it.", "followups": ["Which metric, and how big is the gap versus the number two?", "How many years has the gap persisted, and is it widening?", "Competitors can see exactly what they do. Why can they not copy it?"]}, {"id": "QUA-09", "object": "stock", "mode": "general", "type": "framework", "q": "Rank the moat as hard or soft, and tell me what it would take to break it.", "principle": "Hard moats are structural: they rest on physics, contracts, regulation, geography, or arithmetic that a competitor cannot alter with effort or capital. Soft moats rest on behaviour, habit, reputation, and organisational quality — real, but contingent on continued good decisions. The distinction determines how much you can underwrite and how much management risk you are accepting.", "framing": ["Classify the barrier: is it a structural fact, or a behavioural pattern that must be maintained?", "Ask what could break it — a technology change, a regulatory change, a determined competitor, or several years of poor management.", "Estimate the time to break. Hard moats break slowly and visibly; soft moats can break quickly and quietly.", "Ask how much management skill is required to keep the moat intact. That is the management risk you are underwriting.", "Check for erosion evidence in the numbers already — pricing, retention, share, incremental margins.", "State how many years of the current economics you would actually underwrite, and defend that number."], "matters": "The practical output of this analysis is a duration, and it should feed straight into how you value the business. A hard moat justifies underwriting a long period of excess returns and paying for it; a soft moat justifies a much shorter one. Most valuation disagreements about quality businesses are really disagreements about this duration, and stating your number explicitly is what separates a rigorous answer from a comfortable one.", "trap": "Treating all moats as equivalent because they are all called moats. Underwriting soft-moat businesses on hard-moat durations. Assuming a moat that has held for a decade is structural when it might just be well-managed.", "followups": ["How many years of excess returns are you actually underwriting?", "Could three years of mediocre management break this?", "What is the earliest observable sign of erosion?"]}, {"id": "QUA-10", "object": "stock", "mode": "general", "type": "framework", "q": "Is the moat widening or narrowing right now? Give me the leading indicators.", "principle": "Moats are dynamic, and the direction matters more than the level for a twelve-month investor. The market prices the level, which is visible in current margins and returns; it prices the direction slowly, because direction shows up first in operating metrics that lead the financials by several quarters. That lag is a durable source of edge on both the long and short side.", "framing": ["Track pricing: is realised price rising or falling relative to inflation and to competitors?", "Track gross retention and its trend, which reveals switching costs directly.", "Track win rates in competitive deals, and the reasons given for losses.", "Track customer acquisition cost and payback period. Rising CAC means the position is getting harder to defend.", "Track incremental margins, which reveal whether scale is still translating into economics.", "Track the competitive set itself: who is entering, who is exiting, and who is being funded."], "matters": "Rising customer acquisition cost against flat pricing is the earliest reliable warning that a moat is eroding, and it typically precedes visible margin damage by four to eight quarters. It means the company is paying more to win the same customer at the same price, which is what competitive pressure looks like before it reaches the income statement. This is exactly the kind of signal that a twelve-month horizon is built to exploit.", "trap": "Reading current high margins as evidence of a healthy moat — margins are the most lagging indicator available. Ignoring the reasons behind competitive losses. Assuming a stable share means a stable moat when share is being defended with discounting.", "followups": ["What has happened to CAC payback over eight quarters?", "What reason do they give when they lose a deal, and has it changed?", "Is share being held with price or with product?"]}, {"id": "QUA-11", "object": "stock", "mode": "general", "type": "framework", "q": "If the moat is real, show me where it appears in the financial statements.", "principle": "A power that cannot be located in the financials is a story. Every genuine power produces a specific, identifiable financial signature — and knowing which signature belongs to which power lets you work backwards from the statements to the structural claim, and to test a management narrative against the evidence.", "framing": ["Start with return on invested capital, excluding goodwill, sustained over a full cycle. That is the summary statistic for all powers.", "Map benefit to line: pricing power appears in gross margin, scale in operating leverage, switching costs in retention and low churn-related spend, network effects in customer acquisition cost falling with scale.", "Check capital intensity. Some powers show up as needing less capital rather than earning more margin.", "Compare against the closest competitors on the same lines. A power is relative, so absolute levels are meaningless alone.", "Test persistence: how many consecutive years has the gap held?", "Look for the counter-evidence — rising costs required to sustain the position."], "matters": "Work backwards from the statements to the claim rather than forwards from the narrative. If someone claims network effects, customer acquisition cost should be falling as the network grows; if it is rising, the claim is wrong regardless of how compelling the story is. This reversal is the single most useful discipline in quality analysis, because it converts an unfalsifiable strategic assertion into a testable prediction about a number you can look up.", "trap": "Accepting high margins as proof of a moat without checking capital intensity and competitor margins. Using adjusted figures that capitalise the very spending required to defend the position.", "followups": ["What is ROIC excluding goodwill, and how does it compare to the number two?", "Your claimed power predicts a specific line moves. Does it?", "How many consecutive years has the gap persisted?"]}, {"id": "QUA-12", "object": "stock", "mode": "general", "type": "framework", "q": "Great business, but is it a great investment? Separate those two for me.", "principle": "Quality and return are different questions, and the connection between them runs entirely through price and through the market's expectations. A great business at a price that already discounts its greatness is a mediocre investment. The only way quality generates excess return is if the market underestimates the durability, the reinvestment opportunity, or the terminal value of the advantage.", "framing": ["State what the current price implies about growth duration and terminal returns on capital.", "Identify where your view differs: is the moat more durable than priced, wider than priced, or is the reinvestment runway longer?", "Ask whether the company can reinvest at these returns. High returns with nowhere to deploy capital is a cash-return story, not a compounding one.", "Distinguish the quality of the business from the quality of the entry point, explicitly.", "Ask what the market would have to learn to close the gap, and over what period.", "State your return under your view and under consensus, so the asymmetry is visible."], "matters": "The most durable source of edge in quality investing is duration, not level. Markets are generally good at recognising that a business is excellent and reliably bad at estimating how long excellence persists, because the models that price it use fade assumptions borrowed from averages. If your variant view is that the fade is slower than assumed, say so explicitly and quantify it — that is a real, defensible, and repeatedly profitable claim. If your only view is that the business is good, you have no edge, because everyone already agrees.", "trap": "Pitching quality as if it were the whole thesis. Assuming a great business is always worth owning at any price. Ignoring that a business earning 40% returns with no reinvestment options compounds at its payout yield, not at 40%.", "followups": ["What growth duration does today's price imply?", "Can they reinvest at these returns, or is this a dividend in disguise?", "Everyone agrees this is a great business. What do you know that they do not?"]}]}, {"pillar": "projections", "title": "Projections", "blurb": "Driver trees end to end: unit economics from the bottom up, market versus company growth, operating leverage, and turning a thesis into numbers.", "cards": [{"id": "PRJ-01", "object": "stock", "mode": "general", "type": "framework", "q": "You think gross margins expand because the mix shifts toward a higher-value product. Build the projection — which lines move, in what order, and which assumption is doing the work?", "principle": "A model is a rendering of a thesis, not a forecast. Every qualitative claim has to land on a specific line, through a specific mechanism, with a specific lag. If a belief does not move a line, it is not a thesis — it is an observation. Conversely, if a line moves and you cannot name the mechanism, you have modelled a wish.", "framing": ["Drivers, never growth rates. Revenue is units times price times attach or mix. A typed-in growth percentage hides the thing you are actually arguing about.", "Mechanism and lag. Mix shift reaches reported gross margin only as the installed base turns over. State the turnover rate, because that is usually the real disagreement.", "Follow the cost consequence. Premium products cost more to sell and support. Margin rising with no offsetting spend is a free lunch you have modelled into existence.", "Express operating leverage as incremental margin — revenue grows one hundred, EBIT grows forty. A ramp toward a target margin hides the assumption; an incremental margin states it.", "Cross-check twice: has this company ever expanded gross margin this fast, and has anyone in the sector?", "Make the balance sheet agree. Growth consumes working capital and capex."], "matters": "Find the load-bearing assumption — the one that, halved, kills the thesis — and build the case where it only half works. That two-thirds case is the number you should actually underwrite; the base case is marketing. Then ask what the market's model implies for the same line, because the gap between those two lines is your entire edge.", "trap": "Smooth ramps to a target margin. Reverse-engineering assumptions to reach a price target you had already decided on. Three-statement precision on a business whose critical variable is unknowable.", "followups": ["Which line moves first, and when would it be visible?", "What if the mix shift takes twice as long — is it still a good investment?", "What incremental margin is implied by your year-three numbers, and has this company ever printed that?"]}, {"id": "PRJ-02", "object": "stock", "mode": "tech", "type": "framework", "q": "Build me the revenue driver tree for a subscription software business. Go as deep as the tree actually goes.", "principle": "A driver tree decomposes revenue until every leaf is something you can independently observe, research, or defend. The discipline forces you to locate exactly where your view differs from consensus, because disagreement always lives at a leaf, never at the trunk.", "framing": ["Revenue equals customers times average revenue per customer. Decompose both.", "Customers equals opening customers, plus new, minus churned. New customers equals leads times conversion, or sales capacity times productivity times win rate.", "Average revenue per customer equals seats or usage, times price, times product attach.", "Split every driver between existing customers and new customers. They behave differently and should never be blended.", "Push each leaf until it is observable — sales headcount, quota attainment, list price, published usage tiers, disclosed retention.", "Then state which single leaf your variant view lives in."], "matters": "Sales capacity is the most under-modelled driver in software and the most observable. New bookings are ultimately constrained by the number of quota-carrying reps times their productivity, and headcount is visible through hiring pages and professional profiles with a two-to-three-quarter lead on revenue. A company that has stopped hiring reps has told you its next-year growth rate whether or not it has guided to it.", "trap": "Stopping the tree at a revenue growth percentage. Blending new and existing customer behaviour into a single average. Building a tree so deep it becomes unmaintainable — stop at observable, not at atomic.", "followups": ["Which leaf does your variant view actually live in?", "What is their quota-carrying headcount doing, and what does that imply for next year?", "Is growth coming from more customers or more per customer, and which is more durable?"]}, {"id": "PRJ-03", "object": "stock", "mode": "general", "type": "framework", "q": "Walk me through the unit economics from a single customer, and tell me whether this business actually works.", "principle": "Unit economics answer whether the business creates value per unit sold, independent of growth. Growth masks bad unit economics entirely — a company acquiring customers at a loss reports revenue growth right up until it stops spending. Building from one customer up is the only way to see whether scale will ever produce profit.", "framing": ["Start with one customer: revenue per year, gross margin per year, and therefore gross profit per year.", "Establish the fully loaded cost to acquire that customer, including all sales and marketing, not just the direct commission.", "Compute payback in months on a gross profit basis, not a revenue basis.", "Establish the retention curve and therefore expected lifetime, being honest that early-cohort retention is a poor guide for later cohorts.", "Add expansion revenue if it is real and evidenced, discounting it appropriately since it arrives later.", "Compare lifetime gross profit to acquisition cost, and separately ask whether the ongoing cost to serve is included."], "matters": "Two disciplines separate real unit economics from marketing arithmetic. First, use gross profit rather than revenue for payback — a business with 50% gross margin and a twelve-month revenue payback actually has a twenty-four-month payback. Second, be suspicious of any lifetime value that relies on retention beyond the observed history; assuming a customer lasts ten years when the company is five years old is an assumption, not a measurement, and it is where most LTV to CAC ratios are manufactured.", "trap": "Revenue-based payback. Lifetime assumptions longer than the observed data. Excluding the cost to serve. Using blended CAC that mixes cheap inbound with expensive outbound and hides the marginal cost of the next customer.", "followups": ["Is that payback on gross profit or revenue?", "How long is the actual observed retention history?", "What does the marginal customer cost, not the blended average?"]}, {"id": "PRJ-04", "object": "stock", "mode": "general", "type": "framework", "q": "You are forecasting 20% growth for three years. Decompose that into what the market gives them and what they have to earn.", "principle": "Company growth is market growth times share change times price and mix. Separating the components is what makes a forecast defensible, because each component has a different level of uncertainty, a different evidence base, and a different durability. A forecast that cannot be decomposed cannot be defended.", "framing": ["Establish market growth independently, and state your source and confidence.", "State the implied share change. If your forecast requires steady share gain, that is a claim needing a mechanism.", "Name the mechanism for share gain and ask whether it is repeatable each year or a one-time step.", "Separate price and mix from volume, since they have different margin consequences.", "Add any inorganic contribution explicitly, and consider whether acquisitions should be in an organic forecast at all.", "Sanity-check the cumulative result: what share do they hold in year three, and is that plausible?"], "matters": "Always compound the share implication out and look at the endpoint. Forecasts built one year at a time frequently imply share levels by year five that nobody would defend if stated directly — this is the most common way sell-side models become quietly absurd. Two hundred basis points of share gain a year sounds modest and reasonable; compounded over five years in a consolidated market it often implies the company has taken essentially all available share from a competitor who is presumably responding.", "trap": "Forecasting company growth without an independent market growth number. Assuming share gain continues at the recent rate indefinitely. Never checking the terminal share the model implies.", "followups": ["What share does your model imply in year five?", "Is the share gain mechanism repeatable, or is it one large deal?", "What is the competitor you are taking share from doing in your model?"]}, {"id": "PRJ-05", "object": "stock", "mode": "tech", "type": "framework", "q": "Net revenue retention is 120%. What does that actually tell you, and what does it hide?", "principle": "Net retention is a composite of expansion, price increases, and churn, and the composite can stay flat while its components deteriorate badly. It is the most cited and least decomposed metric in software. The underlying question — do customers become more valuable over time, and do they stay — requires looking at the cohorts, not the aggregate.", "framing": ["Decompose into gross retention, expansion from seat or usage growth, and price increases. Three very different sources of the same number.", "Ask which is doing the work. Price-driven retention has a ceiling; usage-driven retention scales with the customer's business.", "Look at retention by cohort and by vintage. A blended number is dominated by the largest, oldest, best customers.", "Ask whether the metric is calculated on customers or on dollars, since dollar-weighting hides the loss of many small accounts.", "Check the trend in the newest cohorts, which is the leading indicator that matters.", "Ask what happens to expansion revenue when the customer's own business stops growing."], "matters": "Expansion driven by the customer's own growth is borrowed durability. When net retention comes from customers hiring more people or processing more transactions, the metric is a derivative of your customers' growth rates, and it falls the moment their growth falls — simultaneously, across the whole base, with no company-specific warning. Retention driven by adding products is genuinely stronger, because it reflects a deepening relationship rather than a bet on the customer's own expansion.", "trap": "Citing net retention as evidence of switching costs — gross retention measures that. Reading a blended cohort number and missing deterioration in recent vintages. Extrapolating expansion revenue through a downturn.", "followups": ["What is gross retention, and what is the trend?", "How much of the expansion is the customer growing versus buying more products?", "What do the last four cohorts look like compared to the 2021 vintage?"]}, {"id": "PRJ-06", "object": "stock", "mode": "general", "type": "framework", "q": "Revenue grows 100 million. How much falls to EBIT, and how do you defend that number?", "principle": "Incremental margin is the honest expression of operating leverage. It forces you to state explicitly how much of each new revenue dollar reaches profit, rather than hiding the assumption inside a smooth margin ramp. It is also directly checkable against the company's own history, which makes it the fastest way to falsify an optimistic model.", "framing": ["Classify every cost line as fixed, semi-variable, or variable in the relevant range.", "Start from gross margin on incremental revenue, which may differ from the average if mix is shifting.", "Ask which operating costs genuinely do not need to grow with revenue, and be sceptical — most scale somewhat.", "Consider step costs. Capacity, offices, and infrastructure arrive in lumps, not smoothly.", "Compute the implied incremental margin and compare it to what the company has actually delivered in prior growth years.", "Ask what management does with any upside — many companies reinvest operating leverage rather than dropping it through."], "matters": "Compare your implied incremental margin against the company's own realised history before defending it. If a business has historically delivered thirty percent incremental margins and your model implies fifty, you are making a specific claim about a behavioural change, and you should be able to name what changed. Management reinvestment is the usual reason models overestimate this: companies with good growth options reinvest leverage rather than letting it reach EBIT, and that is often the right decision for the business while being wrong for your forecast.", "trap": "Assuming operating costs are fixed when they are semi-variable. Ignoring step costs and modelling smooth leverage. Forgetting that management will spend the upside if the growth opportunity is real.", "followups": ["What incremental margin has this company actually delivered historically?", "Which cost lines are genuinely fixed, and for how much more revenue?", "If they beat, do they let it drop through or reinvest it?"]}, {"id": "PRJ-07", "object": "stock", "mode": "general", "type": "framework", "q": "What does this business earn at maturity, and how did you get to that number?", "principle": "For a medium-term horizon, terminal assumptions dominate the valuation, and terminal margin is usually the least examined number in the model. Deriving it from industry structure and required returns on capital, rather than from management targets or a smooth extrapolation, is what separates a defensible target from an anchored one.", "framing": ["Identify structurally mature analogues and look at where their margins actually settled.", "Work backwards from required return on capital: given the capital intensity, what margin earns a fair return?", "Separate genuine growth investment, which falls away, from the ongoing cost of maintaining the position, which does not.", "Ask what competition does to price as differentiation narrows with maturity.", "Consider the customer mix at maturity — later customers are usually smaller and less profitable to serve.", "Stress the assumption: what is the business worth if terminal margin is five points lower?"], "matters": "Be disciplined about how much current spending is genuinely discretionary growth investment. Companies and their advocates routinely characterise most sales, marketing and research spend as growth investment that will normalise, but a large part of it is the cost of holding the position against competitors who have not gone away. The honest question is what spend is required to stand still at maturity — that number is much higher than the bull case assumes, and it is where terminal margin estimates most often go wrong.", "trap": "Adopting management's long-term margin model as the terminal assumption. Assuming all sales and marketing is growth spend. Using peak-cycle margins as mature margins.", "followups": ["What return on capital does your terminal margin imply?", "How much of today's opex is required just to stand still?", "What is the stock worth if terminal margin is five points lower?"]}, {"id": "PRJ-08", "object": "stock", "mode": "general", "type": "framework", "q": "Your model has revenue doubling. Does the balance sheet agree?", "principle": "Growth consumes capital. Working capital scales with revenue, capacity requires capex, and both consume cash before the earnings arrive. A projection where revenue doubles while the balance sheet stands still is internally inconsistent, and the inconsistency usually flatters both cash flow and returns on capital.", "framing": ["Establish working capital as a percentage of revenue historically, and hold it roughly constant unless you can justify improvement.", "Ask what capex is required for the volume, separating maintenance from growth capex.", "Check the timing: capital is spent before revenue arrives, so the cash flow trough comes first.", "Compute the free cash flow profile, not just earnings. Fast-growing capital-intensive businesses can grow earnings while burning cash.", "Ask how the capital is funded — internally, with debt, or with equity, since the last one changes per-share outcomes.", "Check that implied return on incremental capital is plausible against the company's history and the industry."], "matters": "Return on incremental invested capital is the number that ties the whole projection together, and it is the fastest sanity check available. Compute the additional capital your model requires and the additional profit it produces. If the implied incremental return is far above what the business or the industry has ever earned, the model is wrong somewhere, and this test tells you so in about two minutes — usually faster than finding the error by inspection.", "trap": "Modelling margin expansion while ignoring the capital required to support the volume. Assuming working capital improves as a percentage of revenue without a reason. Forgetting that equity funding dilutes the per-share outcome you are actually forecasting.", "followups": ["What return on incremental capital does your model imply?", "When is the cash flow trough, and can they fund it?", "Are you assuming working capital efficiency improves, and why?"]}, {"id": "PRJ-09", "object": "stock", "mode": "general", "type": "framework", "q": "Forget your model. What is the market's model, and where exactly do you differ?", "principle": "The price already contains a forecast. Reverse-engineering it turns a vague sense that a stock is cheap into a specific, falsifiable disagreement about a named variable. This is the most direct route to knowing whether you have an edge, and it frequently reveals that you do not.", "framing": ["Take the current price and solve for what it implies — growth rate, duration of growth, terminal margin, or terminal return on capital.", "Sanity-check the implication against history and against the industry. Sometimes the implied number is obviously unreasonable in either direction.", "Line up your assumptions against the implied ones, variable by variable.", "Identify the one or two variables where you genuinely differ, and be honest that on most variables you agree.", "Quantify the difference and its value impact.", "Ask why the market holds its view — there is usually a reason, and understanding it is part of the work."], "matters": "Doing this properly usually reveals that your disagreement is narrower than you thought, and that is valuable rather than deflating. A well-formed thesis differs from consensus on one or two variables and agrees on the rest, and it can state the value of being right on exactly those. Anyone who claims to differ on every assumption has not done this exercise — they have built a model that reflects their conclusion.", "trap": "Comparing your price target to the sell-side price target instead of comparing assumptions. Assuming the market is simply wrong without articulating why it holds its view. Differing on everything, which means you have anchored on an answer.", "followups": ["What growth duration does the current price imply?", "Which single variable carries your entire disagreement?", "Why does the market believe what it believes? Give me their best argument."]}, {"id": "PRJ-10", "object": "stock", "mode": "general", "type": "framework", "q": "Give me your bull, base, and bear. Then tell me why those three numbers are not useless.", "principle": "Scenarios are only informative when each one is a coherent state of the world with its own internal logic, rather than the base case with a multiplier applied. Three scenarios that share every assumption except the growth rate convey no more information than a single number and create false confidence in a range.", "framing": ["Build each scenario around a different answer to the load-bearing question, not around a different growth rate.", "Make the assumptions internally consistent — in a weak demand scenario, pricing, margin, and capital allocation all respond together.", "Attach rough probabilities and be willing to defend them, including with base rates.", "State the value in each scenario and compute a probability-weighted expected value.", "Check the asymmetry: how much do you make if right, how much do you lose if wrong, and how does that compare to the probabilities.", "Identify what evidence would move weight between scenarios, and when it arrives."], "matters": "Consistency within a scenario is what makes the exercise real. A genuine bear case is not the base case with lower growth — it is a world where growth disappoints, so pricing gets defensive, so gross margin compresses, so management cuts investment, so the growth outlook worsens further, and the multiple contracts on top of all of it. Those effects compound, which is why real bear outcomes are usually far worse than a mechanically reduced growth rate suggests, and why the exercise matters for sizing.", "trap": "Sensitivity analysis dressed up as scenario analysis. Symmetric bull and bear cases when the underlying distribution is not symmetric. Assigning probabilities after choosing the answer you wanted.", "followups": ["What is different about the world in your bear case, beyond the growth rate?", "Does the multiple move in your scenarios, and why?", "What single piece of evidence would shift weight between these, and when do you get it?"]}]}, {"pillar": "thesis", "title": "Thesis & Pitch", "blurb": "Variant perception, what is priced in, catalysts and re-rating, kill criteria, expression and sizing, and the pitch itself.", "cards": [{"id": "THS-01", "object": "stock", "mode": "general", "type": "framework", "q": "You like the stock. What does the market believe that you think is wrong — and why are you the one who is right?", "principle": "A thesis without a variant perception is a description. The market has already looked at this company, and the price reflects a considered view. Your return comes from the gap between that view and reality, which means you must be able to state the market's view accurately before claiming it is wrong.", "framing": ["State consensus specifically and numerically — what estimates and what multiple, and therefore what the price implies.", "State your view in the same units, so the gap is visible.", "Explain the source of your edge: informational, analytical, or time-horizon.", "Explain why the market holds its view. There is usually a structural reason, and naming it makes your claim credible.", "Say what evidence would confirm or refute you, and when it arrives.", "Size the gap in value terms."], "matters": "For a fund with a twelve-month horizon, time-horizon arbitrage is the most honest and most repeatable edge to claim. You are not asserting that you have better information than the market or that you are cleverer than the analysts covering it — you are asserting that the market is discounting the next two quarters and you are underwriting the next eight. That is a structural feature of how most capital is managed, it does not require you to be smarter than anyone, and it is defensible in an interview in a way that claiming informational edge usually is not.", "trap": "Saying the market does not appreciate the quality of this business — unfalsifiable, and everyone says it. Claiming informational edge you do not have. Being unable to state what consensus actually is in numbers.", "followups": ["How do you know that is consensus?", "If you are right, why has it not happened yet?", "Who is the marginal seller here, and what do they believe?"]}, {"id": "THS-02", "object": "stock", "mode": "general", "type": "framework", "q": "What is priced in at 30 times earnings?", "principle": "A multiple is not a judgement of cheap or expensive — it is a compressed forecast. Decoding what a price implies about growth, duration and returns converts a valuation opinion into a testable claim, and it is the fastest way to determine whether an apparently expensive stock is actually discounting something achievable.", "framing": ["Convert the multiple into an implied expectation: what growth, sustained for how long, at what terminal return, justifies this price?", "Compare that implied growth duration against the company's history and the industry's.", "Separate what is priced about the near term from what is priced about the terminal value. For high multiples, most of the value is terminal.", "Check what the multiple has been historically and what changed, if anything, in the business.", "Ask what the stock does if the company merely delivers consensus.", "State what would have to be true for the current price to prove conservative."], "matters": "The most useful version of this question is what happens if the company simply meets expectations. For richly valued stocks the answer is frequently that the stock does nothing or falls, because the price already contains several years of successful execution — which means meeting expectations is not a good outcome, it is the neutral one. Knowing that changes how you underwrite the position and how you size it, and it is the discipline that keeps quality investors out of expensive disappointments.", "trap": "Comparing the multiple to peers without asking what any of them imply. Treating a high multiple as automatically expensive or a low one as cheap. Ignoring that most of a high multiple's value sits beyond the forecast period.", "followups": ["What growth duration does that multiple imply?", "What does the stock do if they simply hit consensus?", "What has to be true for this price to look conservative in hindsight?"]}, {"id": "THS-03", "object": "stock", "mode": "general", "type": "anchored", "q": "A vertical software company, two billion enterprise value, growing 18%, 25% EBIT margins, trading at 28 times EBIT. You think it is a double in three years. Over the next twelve months, what makes the market agree with you — and what do you watch monthly to know it is working?", "principle": "For a medium-term horizon, catalysts are evidence-generating events rather than single-day prints. Separate thesis-confirming milestones, which tell you privately that you are right, from re-rating events, which make the market change its estimates. You need both, and they are rarely the same thing.", "framing": ["Numbers events: estimate revisions, guidance resets, a margin inflection actually appearing in reported results.", "Company actions: pricing moves, product cycle, capital allocation, segment disclosure, acquisitions.", "Industry and external: competitor exit, cycle turn, regulation, channel data.", "Ownership and narrative: index inclusion, initiations, lock-up expiry, activist involvement, a breakup.", "Attach a window to each, and name the two or three things you would monitor monthly.", "State how much of the return is earnings versus multiple."], "matters": "A twelve-month re-rating almost always requires the consensus estimate path to move, not just sentiment. Multiples expand when analysts raise numbers and extend their forecast horizon, which happens when reported results force it. So the catalyst that matters is whichever event first makes the estimate revisions unavoidable — identify that one, date it, and build the monitoring around it rather than around the narrative.", "trap": "Naming an earnings date as a catalyst without saying what in the print changes the estimate path. Listing catalysts you cannot observe until after the stock has moved. Confusing volatility events with re-rating events.", "followups": ["If none of that happens in twelve months, do you still own it?", "Which catalyst is most likely to break the thesis rather than confirm it?", "How much of your double is multiple expansion, and who pays that multiple?"]}, {"id": "THS-04", "object": "stock", "mode": "general", "type": "framework", "q": "It is a year from now and the position has lost you 30%. What happened?", "principle": "A pre-mortem surfaces risks that a bear case misses, because it forces you to reason backwards from a bad outcome you are required to accept as real. Stating kill criteria in advance converts an emotional decision under stress into a rule set while you are still thinking clearly, which is when your judgement is worth the most.", "framing": ["Assume the loss is real and give three distinct causes, ranked by likelihood rather than severity.", "Separate thesis failure, where you were wrong about the business, from price failure, where you were right but the multiple compressed.", "Identify which of these you would see early and which would arrive as a surprise.", "Define kill criteria: what specific observation, not price move, tells you the thesis is broken.", "Distinguish kill criteria from add criteria, since the same drawdown can be either depending on what caused it.", "State the maximum loss you would accept before forcing a full re-underwrite."], "matters": "The most valuable discipline here is separating a broken thesis from a cheaper stock, because they demand opposite actions and feel identical in the moment. Write the specific observable that would tell you the thesis is broken — retention below a number, a competitor winning a class of deal, a margin trajectory that stalls for two consecutive quarters — before you own it. Price alone is never a kill criterion, but it is the thing that will pressure you to invent one.", "trap": "Giving only the market-wide bear case, which says nothing specific about this position. Setting kill criteria in terms of price rather than evidence. Confusing a drawdown with a broken thesis.", "followups": ["Which of those causes would you see coming, and which arrives as a surprise?", "What specific observation, not price, tells you the thesis is broken?", "Down 30% on a multiple de-rate with the thesis intact — do you add?"]}, {"id": "THS-05", "object": "theme", "mode": "general", "type": "framework", "q": "You are right about the theme. How do you express it, and how big do you make it?", "principle": "Expression and sizing are where a correct view becomes a return or a disappointment. The same thesis can be expressed with different risk profiles, and the choice should follow from what you actually know versus what you are merely exposed to. Sizing follows conviction and asymmetry, not enthusiasm.", "framing": ["List the possible expressions: the pure play, the diversified beneficiary, the supplier, the enabler, and the short side.", "For each, ask what proportion of the return depends on your specific insight versus on factors you have no view on.", "Prefer the expression with the highest ratio of thesis exposure to unrelated exposure.", "Consider whether a pair or a hedge isolates the view, and be honest about the cost and the basis risk.", "Size from asymmetry and conviction: how much do you make if right, lose if wrong, and how confident are you.", "State what would make you add and what would make you cut, before you put it on."], "matters": "The cleanest expression is usually the one where the most of your return depends on the thing you actually did the work on. A company where your insight drives 70% of the outcome is better than a pure play where it drives 30% and the rest is exposure to a cycle, a currency, or a management team you have never assessed. In a concentrated long-biased book this discipline matters more than in a hedged one, because you cannot rely on the hedge to strip out the noise.", "trap": "Choosing the most levered expression rather than the most targeted one. Sizing on excitement. Assuming a pair trade removes risk when the two legs share a factor exposure that dominates both.", "followups": ["What percentage of your return in that name depends on your actual insight?", "What are you exposed to that you have no view on?", "What makes you double it, and what makes you halve it?"]}, {"id": "THS-06", "object": "stock", "mode": "general", "type": "framework", "q": "How do you assess management, beyond meeting them?", "principle": "Management assessment is a judgement about capital allocation and honesty, and both are visible in the record. Meetings are the least reliable input available, because senior executives are selected in part for their ability to be persuasive in exactly that setting. The historical record of decisions and disclosures is far more informative.", "framing": ["Review capital allocation history: acquisitions and their returns, buybacks and the prices paid, capex and what it earned.", "Ask whether they buy back stock counter-cyclically or when it is expensive and comfortable. This one fact is enormously revealing.", "Read old guidance against outcomes. Do they set achievable targets and meet them, or set aspirational ones and miss?", "Look at how they discuss failure. Specific, unflattering candour is rare and highly correlated with honest reporting.", "Examine incentive structures — what are they actually paid on, and does it match what you want them to do?", "Check insider behaviour over time, weighting open-market purchases far above grants."], "matters": "Buyback behaviour across a cycle is the single most informative disclosure about a management team's judgement and independence. Buying heavily at peak valuations and stopping during a drawdown reveals that they are managing optics or earnings per share, not value — and that same judgement is being applied to everything you cannot see. It is a free look at how they think about price and value, disclosed quarterly, and most investors ignore it entirely.", "trap": "Weighting a meeting impression above the capital allocation record. Assuming founder-led implies long-term-oriented. Treating stock grants and scheduled sales as an insider signal.", "followups": ["When did they buy back the most stock, and at what multiple?", "What are they compensated on, and what does that make them do?", "Show me a time they admitted a mistake specifically and early."]}, {"id": "THS-07", "object": "stock", "mode": "general", "type": "framework", "q": "Pitch me a stock. Ninety seconds.", "principle": "The pitch is a compression test. In ninety seconds you can convey a thesis, a variant perception, and an asymmetry, but only if you have decided in advance what to leave out. Everything you say that a competent generalist could have said from a screen is wasted time, and the omissions are what reveal whether you understand the investment.", "framing": ["One sentence on what the company does, pitched at a level that a smart generalist follows immediately.", "The thesis in one sentence: what you think happens and over what period.", "The variant perception: what the market believes and why it is wrong, in numbers.", "Two or three supporting points, each one evidence rather than assertion.", "The return: what it is worth, what you make, and what you lose if wrong.", "The main risk, stated by you before they ask, and why you are comfortable with it."], "matters": "Lead with the variant perception rather than the business description. The listener does not need to be sold on the company; they need to know why this is a mispricing and not simply a good business that everyone already recognises. Naming the main risk yourself is the strongest signal available that you have done the work and are not selling — and the single most common failure is spending sixty of the ninety seconds on background that establishes nothing.", "trap": "Spending most of the time on what the company does. Presenting quality as if it were the thesis. Waiting to be asked about the risk. Being unable to state the downside in numbers.", "followups": ["What is the bear case, in their words rather than a strawman?", "What would you need to see to double the position?", "Why is this better than the second-best idea you have?"]}, {"id": "THS-08", "object": "stock", "mode": "general", "type": "framework", "q": "You are long. Make the case that this is actually a short.", "principle": "Being able to argue the other side well is the most reliable test of whether you understand a position. A long-biased investor still needs this: it stress-tests the thesis, reveals what the marginal seller believes, and identifies which evidence would flip you. A weak bear case usually means you have not found the real one.", "framing": ["Build the strongest version, not a strawman, and use the actual arguments of people who are short.", "Separate the valuation short, where the business is fine but the price is wrong, from the fundamental short, where the business deteriorates.", "Identify the accounting or disclosure angle: anything the company has stopped disclosing, or a widening gap between adjusted and reported figures.", "Ask what the short's catalyst is and over what horizon, since a short needs timing far more than a long does.", "State what evidence would convert you from long to short.", "Say why, having made the case, you still hold the long."], "matters": "A company quietly ceasing to disclose a metric it used to highlight is among the most consistently informative signals available, and it costs nothing to track. Companies disclose what flatters them, so a discontinued metric almost always deteriorated. Reviewing what has dropped out of the disclosure over several years is a fast, high-yield exercise on both sides of a position, and it frequently surfaces the bear case before it appears in the reported numbers.", "trap": "Building a strawman bear case that is easy to dismiss. Confusing an expensive stock with a short, since expensive stocks can stay expensive for years. Not knowing what the actual short interest thesis is.", "followups": ["What has this company stopped disclosing?", "What is the gap between adjusted and reported earnings, and is it widening?", "What evidence would flip you from long to short?"]}]}];

const state = {
  screen: "home",
  mode: "general",   // general | tech   (diligence)
  diff: "clean",     // clean | precise  (math)
  queue: [],
  idx: 0,
  revealed: false,
  fuShown: 0,
  deckLabel: "",
  results: [],
};

const $ = (id) => document.getElementById(id);
const el = (tag, cls, text) => {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text !== undefined) n.textContent = text;
  return n;
};
const shuffle = (a) => { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

/* ---------------- home ---------------- */

function renderHome() {
  state.screen = "home";
  $("deckname").textContent = "Drill";
  $("counter").textContent = "";
  $("track").style.width = "0%";

  const m = $("main");
  m.innerHTML = "";

  const hero = el("div", "hero");
  const h1 = el("h1", null, "Two things get you hired.");
  const p = el("p", null, "Fast arithmetic, and a structured answer to an open question. Pick a deck.");
  hero.append(h1, p);
  m.append(hero);

  m.append(groupLabel("Diligence"));
  const dwrap = el("div", "decks");
  const avail = DECKS.filter((d) => countFor(d) > 0);
  avail.forEach((d) => dwrap.append(deckButton(d.title, d.blurb, countFor(d), () => startDiligence([d], d.title))));
  const total = avail.reduce((s, d) => s + countFor(d), 0);
  dwrap.append(deckButton("Everything", "All four decks, shuffled together. This is the interview.", total, () => startDiligence(avail, "Everything")));
  m.append(dwrap);

  m.append(groupLabel("Mode"));
  m.append(segment([
    ["general", "General"],
    ["tech", "Tech-specific"],
  ], state.mode, (v) => { state.mode = v; renderHome(); },
  "Tech mode adds software, semis and platform cards to every deck."));

  m.append(groupLabel("Math"));
  const mwrap = el("div", "decks");
  const buckets = [...new Set(MATH_GENERATORS.map((g) => g.bucket))];
  buckets.forEach((b) => {
    const gens = MATH_GENERATORS.filter((g) => g.bucket === b);
    mwrap.append(deckButton(b, gens.map((g) => g.name.replace(/&harr;/g, "↔")).join(" · "), gens.length + " gen", () => startMath(gens, b)));
  });
  mwrap.append(deckButton("All math", "Every generator, shuffled. Twenty questions.", MATH_GENERATORS.length + " gen", () => startMath(MATH_GENERATORS, "All math")));
  m.append(mwrap);

  m.append(segmentWrap(segment([
    ["clean", "Clean"],
    ["precise", "Precise"],
  ], state.diff, (v) => { state.diff = v; renderHome(); },
  "Clean resolves in your head in about fifteen seconds. Precise makes you grind.")));

  $("footer").innerHTML = "";
  $("footer").style.display = "none";
}

function countFor(d) {
  return d.cards.filter((c) => state.mode === "tech" || c.mode === "general").length;
}

function groupLabel(t) { return el("div", "grouplabel", t); }

function segmentWrap(node) { const w = el("div"); w.style.marginTop = ".75rem"; w.append(node); return w; }

function segment(opts, current, onPick, note) {
  const wrap = el("div");
  const row = el("div", "toggles");
  const seg = el("div", "seg");
  opts.forEach(([val, label]) => {
    const b = el("button", null, label);
    b.setAttribute("aria-pressed", String(current === val));
    b.onclick = () => onPick(val);
    seg.append(b);
  });
  row.append(seg);
  wrap.append(row);
  if (note) {
    const n = el("p", null, note);
    n.style.cssText = "margin:.55rem 0 0;font-size:var(--step--1);color:var(--ink-3);max-width:40ch";
    wrap.append(n);
  }
  return wrap;
}

function deckButton(title, blurb, n, onclick) {
  const b = el("button", "deck");
  const left = el("div");
  left.append(el("strong", null, title), el("em", null, blurb));
  b.append(left, el("span", "n", String(n)));
  b.onclick = onclick;
  return b;
}

/* ---------------- start ---------------- */

function startDiligence(decks, label) {
  const cards = [];
  decks.forEach((d) => d.cards.forEach((c) => {
    if (state.mode === "tech" || c.mode === "general") cards.push({ kind: "dil", ...c, pillar: d.title });
  }));
  begin(shuffle(cards), label);
}

function startMath(gens, label) {
  const q = [];
  for (let i = 0; i < 20; i++) {
    const g = gens[i % gens.length];
    const v = g.gen(state.diff);
    q.push({ kind: "math", gen: g, ...v });
  }
  begin(shuffle(q), label + " · " + (state.diff === "clean" ? "clean" : "precise"));
}

function begin(queue, label) {
  state.queue = queue;
  state.idx = 0;
  state.results = [];
  state.deckLabel = label;
  $("footer").style.display = "flex";
  renderCard();
}

/* ---------------- card ---------------- */

function renderCard() {
  state.screen = "drill";
  state.revealed = false;
  state.fuShown = 0;

  const c = state.queue[state.idx];
  $("deckname").textContent = state.deckLabel;
  $("counter").textContent = (state.idx + 1) + " / " + state.queue.length;
  $("track").style.width = ((state.idx) / state.queue.length * 100) + "%";

  const m = $("main");
  m.innerHTML = "";
  const body = el("div", "card-body");

  const meta = el("div", "meta");
  if (c.kind === "dil") {
    meta.append(tag(c.id, "id"), tag(c.pillar), tag(c.object), tag(c.type));
  } else {
    meta.append(tag(c.gen.name.replace(/&harr;/g, "↔"), "id"), tag(c.gen.bucket), tag(state.diff));
  }
  body.append(meta);

  const q = el("h2", "q");
  q.innerHTML = c.q;
  body.append(q);

  m.append(body);
  window.scrollTo(0, 0);
  m.scrollTop = 0;

  const f = $("footer");
  f.innerHTML = "";
  const rev = el("button", "primary", "Reveal");
  rev.onclick = reveal;
  f.append(rev);
}

function tag(t, cls) { return el("span", "tag" + (cls ? " " + cls : ""), t); }

function reveal() {
  if (state.revealed) return;
  state.revealed = true;
  const c = state.queue[state.idx];
  const body = document.querySelector(".card-body");
  const back = el("div");

  if (c.kind === "math") {
    const a = el("div", "answer");
    a.innerHTML = c.a;
    back.append(a);

    const method = section("Method");
    const ol = el("ol", "steps");
    c.method.forEach((s) => { const li = el("li"); li.innerHTML = s; ol.append(li); });
    method.append(ol);
    back.append(method);

    if (c.gen.table) {
      const t = collapsible("Reference table", true);
      const w = el("div", "tablewrap");
      w.innerHTML = c.gen.table;
      t.content.append(w);
      back.append(t.node);
    }

    const teach = section("Why it matters");
    const p = el("p");
    p.innerHTML = c.gen.teaching;
    teach.append(p);
    back.append(teach);
  } else {
    const lead = section("The principle");
    lead.classList.add("lead");
    lead.append(el("p", null, c.principle));
    back.append(lead);

    const fr = collapsible("How to frame it", false);
    const ol = el("ol", "steps");
    c.framing.forEach((s) => ol.append(el("li", null, s)));
    fr.content.append(ol);
    back.append(fr.node);

    const mt = collapsible("What matters most", false);
    mt.content.append(el("p", null, c.matters));
    back.append(mt.node);

    const tp = collapsible("Trap", false);
    const tpp = el("p", "trap", c.trap);
    tp.content.append(tpp);
    back.append(tp.node);

    const fu = section("Follow-ups");
    const list = el("div", "followups");
    list.id = "fulist";
    fu.append(list);
    const more = el("button", "ghost", "Show first follow-up →");
    more.id = "fubtn";
    more.onclick = nextFollowup;
    fu.append(more);
    back.append(fu);
  }

  body.append(back);
  showGrades();
}

function section(title) {
  const s = el("div", "sec");
  s.append(el("h3", "sech", title));
  return s;
}

function collapsible(title, open) {
  const d = el("details", "sec");
  if (open) d.open = true;
  const s = el("summary", null, title);
  const content = el("div");
  d.append(s, content);
  return { node: d, content };
}

function nextFollowup() {
  const c = state.queue[state.idx];
  const list = $("fulist");
  const i = state.fuShown;
  if (i >= c.followups.length) return;
  const f = el("div", "fu");
  f.append(el("span", "n", "Follow-up " + (i + 1)), document.createTextNode(c.followups[i]));
  list.append(f);
  state.fuShown++;
  const btn = $("fubtn");
  if (state.fuShown >= c.followups.length) btn.remove();
  else btn.textContent = "Next follow-up →";
}

function showGrades() {
  const f = $("footer");
  f.innerHTML = "";
  [["miss", "Missed", "went blank"], ["shaky", "Shaky", "half there"], ["nail", "Nailed", "clean"]].forEach(([k, label, sub]) => {
    const b = el("button", "grade " + k);
    b.append(el("b", null, label), document.createTextNode(sub));
    b.onclick = () => grade(k);
    f.append(b);
  });
}

function grade(g) {
  const c = state.queue[state.idx];
  state.results.push({ g, label: c.kind === "dil" ? c.id + " · " + c.q : c.gen.name.replace(/&harr;/g, "↔") + " · " + c.q.replace(/<[^>]+>/g, "") });
  state.idx++;
  if (state.idx >= state.queue.length) renderSummary();
  else renderCard();
}

/* ---------------- summary ---------------- */

function renderSummary() {
  state.screen = "summary";
  $("track").style.width = "100%";
  $("counter").textContent = "done";

  const n = state.results.filter((r) => r.g === "nail").length;
  const s = state.results.filter((r) => r.g === "shaky").length;
  const x = state.results.filter((r) => r.g === "miss").length;

  const m = $("main");
  m.innerHTML = "";
  const hero = el("div", "hero");
  hero.append(el("h1", null, "Session done."));
  hero.append(el("p", null, x + s === 0 ? "Clean run. Raise the difficulty or switch decks." : "The ones below are the session. Everything else you already know."));
  m.append(hero);

  const tally = el("div", "tally");
  [["nail", n, "nailed"], ["", s, "shaky"], ["miss", x, "missed"]].forEach(([cls, v, lab]) => {
    const st = el("div", "stat " + cls);
    st.append(el("b", null, String(v)), el("span", null, lab));
    tally.append(st);
  });
  m.append(tally);

  const weak = state.results.filter((r) => r.g !== "nail");
  if (weak.length) {
    m.append(groupLabel("Work these"));
    const rev = el("div", "review");
    weak.forEach((r) => {
      const d = el("div", "r");
      const parts = r.label.split(" · ");
      d.append(el("b", null, parts[0]), document.createTextNode(parts.slice(1).join(" · ")));
      rev.append(d);
    });
    m.append(rev);
  }

  const f = $("footer");
  f.innerHTML = "";
  const again = el("button", "primary", "Run it again");
  again.onclick = () => { begin(shuffle(state.queue), state.deckLabel); };
  const home = el("button", null, "Decks");
  home.onclick = renderHome;
  f.append(home, again);
  window.scrollTo(0, 0);
}

/* ---------------- keys ---------------- */

document.addEventListener("keydown", (e) => {
  if (state.screen !== "drill") return;
  if (e.key === " " || e.key === "Enter") {
    if (!state.revealed) { e.preventDefault(); reveal(); }
  } else if (state.revealed) {
    if (e.key === "1") grade("miss");
    if (e.key === "2") grade("shaky");
    if (e.key === "3") grade("nail");
    if (e.key === "f") nextFollowup();
  }
});

renderHome();
</script>
